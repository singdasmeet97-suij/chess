name: CI

on:
push:
branches:
- main
- master
pull_request:
branches:
- main
- master

jobs:
build:
runs-on: ubuntu-latest

```
strategy:
  matrix:
    node-version: [18.x]

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: ${{ matrix.node-version }}

  - name: Install Dependencies
    run: npm install

  - name: Run Tests
    run: npm test

  - name: Build Project
    run: npm run build --if-present
```
