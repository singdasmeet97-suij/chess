name: Chess Game CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Grant permissions required for deploying to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments from colliding
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify project files
        run: |
          test -f index.html
          test -f style.css
          test -f script.js

      # NEW: Upload your game files to GitHub Pages
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads everything in the root directory

      # NEW: Deploy the uploaded files to create the live link
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4